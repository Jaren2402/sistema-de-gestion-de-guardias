name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del proyecto
        run: |
          pip install fastapi uvicorn sqlmodel pandas flet httpx openpyxl reportlab pytest

      - name: Ejecutar linter (ruff)
        run: |
          pip install ruff
          ruff check .

      - name: Ejecutar pruebas unitarias (pytest)
        run: |
          pytest tests/test_services.py -v